name: MSBuild

on: 
  push:
    branches:
      - 'pub-pac'
  

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .
  # Filepath of the project to be packaged, relative to root of repository
  PROJECT_FILE_PATH: _nilnul_._LIB_.csproj

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Release

jobs:
  build:
    runs-on: windows-latest
    #if: github.ref == 'refs/heads/pub-pac'

    steps:
    - uses: actions/checkout@v2

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore
      #run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    - name: UpdateNuGet packages after restore
      working-directory: ${{env.GITHUB_WORKSPACE}}
      #run: nuget update ${{env.PROJECT_FILE_PATH}}
      run: nuget update packages.config
     

     

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      # Add additional options to the MSBuild command line here (like platform or verbosity level).
      # See https://docs.microsoft.com/visualstudio/msbuild/msbuild-command-line-reference
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}}
      
      
    - name: PushNuget
      run: nuget.exe push "**/*.nupkg" -source https://api.nuget.org/v3/index.json -apiKey ${{ secrets.NUGET_NILNUL}} -skipDuplicate
    
    #- name: PushGithub
      #run: nuget.exe push "**/*.nupkg" -NoSymbols -SkipDuplicate
      #env:
        #NUGET_AUTH_TOKEN: ${{ github.token }} 
    
